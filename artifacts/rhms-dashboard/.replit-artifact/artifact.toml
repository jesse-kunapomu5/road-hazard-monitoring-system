kind = "web"
previewPath = "/"
title = "Road Hazard Monitoring Dashboard"
version = "1.0.0"
id = "artifacts/rhms-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21859

[services.development]
run = "pnpm --filter @workspace/rhms-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rhms-dashboard", "run", "build" ]
publicDir = "artifacts/rhms-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21859"
BASE_PATH = "/"
